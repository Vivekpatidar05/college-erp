{% extends "base.html" %}
{% block title %}Edit Student{% endblock %}
{% block page_title %}Edit Student{% endblock %}

{% block content %}
<div class="page-header">
  <div><h1>Edit Student</h1><div class="breadcrumb"><a href="{{ url_for('students') }}" style="color:var(--primary)">Students</a> / Edit</div></div>
</div>
<div class="card" style="max-width:900px;">
  <form method="POST">
    <div class="form-grid">
      <div class="form-group"><label>Roll Number</label><input name="roll_no" value="{{ student.roll_no }}" required/></div>
      <div class="form-group"><label>Full Name</label><input name="name" value="{{ student.name }}" required/></div>
      <div class="form-group"><label>Email</label><input name="email" type="email" value="{{ student.get('email','') }}"/></div>
      <div class="form-group"><label>Phone</label><input name="phone" value="{{ student.get('phone','') }}"/></div>
      <div class="form-group"><label>Date of Birth</label><input name="dob" type="date" value="{{ student.get('dob','') }}"/></div>
      <div class="form-group"><label>Gender</label>
        <select name="gender">
          {% for g in ['Male','Female','Other'] %}<option {% if student.get('gender')==g %}selected{% endif %}>{{ g }}</option>{% endfor %}
        </select></div>
      <div class="form-group"><label>Course</label>
        <select name="course"><option value="">-- Select Course --</option>{% for c in courses %}<option {% if student.get('course')==c.name %}selected{% endif %}>{{ c.name }}</option>{% endfor %}</select></div>
      <div class="form-group"><label>Year / Semester</label>
        <select name="year">
          {% for y in ['1st Year','2nd Year','3rd Year','4th Year'] %}<option {% if student.get('year')==y %}selected{% endif %}>{{ y }}</option>{% endfor %}
        </select></div>
      <div class="form-group full-width"><label>Address</label><textarea name="address">{{ student.get('address','') }}</textarea></div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Update Student</button>
      <a href="{{ url_for('students') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
