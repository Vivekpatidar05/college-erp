{% extends "base.html" %}
{% block title %}Edit Student{% endblock %}{% block page_title %}Edit Student{% endblock %}
{% block content %}
<div class="page-header"><div><h1>Edit Student</h1><div class="breadcrumb"><a href="{{ url_for('students') }}">Students</a> / Edit</div></div></div>
<div class="card" style="max-width:960px;"><form method="POST"><div class="form-grid">
<div class="form-group"><label>Roll Number</label><input name="roll_no" value="{{ student.roll_no }}" required/></div>
<div class="form-group"><label>Full Name</label><input name="name" value="{{ student.name }}" required/></div>
<div class="form-group"><label>Email</label><input name="email" type="email" value="{{ student.get('email','') }}"/></div>
<div class="form-group"><label>Phone</label><input name="phone" value="{{ student.get('phone','') }}"/></div>
<div class="form-group"><label>Date of Birth</label><input name="dob" type="date" value="{{ student.get('dob','') }}"/></div>
<div class="form-group"><label>Gender</label><select name="gender">{% for g in ['Male','Female','Other'] %}<option {% if student.get('gender')==g %}selected{% endif %}>{{ g }}</option>{% endfor %}</select></div>
<div class="form-group"><label>Course</label><select name="course"><option value="">--</option>{% for c in courses %}<option {% if student.get('course')==c.name %}selected{% endif %}>{{ c.name }}</option>{% endfor %}</select></div>
<div class="form-group"><label>Semester</label><select name="semester">{% for i in range(1,9) %}<option {% if student.get('semester')=='Semester '+i|string %}selected{% endif %}>Semester {{ i }}</option>{% endfor %}</select></div>
<div class="form-group"><label>Year</label><select name="year">{% for y in ['1st Year','2nd Year','3rd Year','4th Year'] %}<option {% if student.get('year')==y %}selected{% endif %}>{{ y }}</option>{% endfor %}</select></div>
<div class="form-group"><label>Category</label><select name="category">{% for cat in ['General','OBC','SC','ST','EWS'] %}<option {% if student.get('category')==cat %}selected{% endif %}>{{ cat }}</option>{% endfor %}</select></div>
<div class="form-group"><label>Blood Group</label><select name="blood_group">{% for bg in ['','A+','A-','B+','B-','O+','O-','AB+','AB-'] %}<option {% if student.get('blood_group')==bg %}selected{% endif %}>{{ bg }}</option>{% endfor %}</select></div>
<div class="form-group"><label>Guardian Name</label><input name="guardian" value="{{ student.get('guardian','') }}"/></div>
<div class="form-group"><label>Guardian Phone</label><input name="guardian_ph" value="{{ student.get('guardian_ph','') }}"/></div>
<div class="form-group full"><label>Address</label><textarea name="address">{{ student.get('address','') }}</textarea></div>
</div>
<div class="form-actions"><button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Update</button><a href="{{ url_for('students') }}" class="btn btn-secondary">Cancel</a></div>
</form></div>{% endblock %}
