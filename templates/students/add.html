{% extends "base.html" %}
{% block title %}Add Student{% endblock %}
{% block page_title %}Add Student{% endblock %}

{% block content %}
<div class="page-header">
  <div><h1>Add Student</h1><div class="breadcrumb"><a href="{{ url_for('students') }}" style="color:var(--primary)">Students</a> / Add New</div></div>
</div>
<div class="card" style="max-width:900px;">
  <form method="POST">
    <div class="form-grid">
      <div class="form-group"><label>Roll Number *</label><input name="roll_no" required placeholder="e.g. MCA2024001"/></div>
      <div class="form-group"><label>Full Name *</label><input name="name" required placeholder="Student full name"/></div>
      <div class="form-group"><label>Email</label><input name="email" type="email" placeholder="student@email.com"/></div>
      <div class="form-group"><label>Phone</label><input name="phone" placeholder="+91 XXXXXXXXXX"/></div>
      <div class="form-group"><label>Date of Birth</label><input name="dob" type="date"/></div>
      <div class="form-group"><label>Gender</label>
        <select name="gender"><option>Male</option><option>Female</option><option>Other</option></select></div>
      <div class="form-group"><label>Course</label>
        <select name="course"><option value="">-- Select Course --</option>{% for c in courses %}<option>{{ c.name }}</option>{% endfor %}</select></div>
      <div class="form-group"><label>Year / Semester</label>
        <select name="year"><option>1st Year</option><option>2nd Year</option><option>3rd Year</option><option>4th Year</option></select></div>
      <div class="form-group full-width"><label>Address</label><textarea name="address" placeholder="Full address…"></textarea></div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Student</button>
      <a href="{{ url_for('students') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
