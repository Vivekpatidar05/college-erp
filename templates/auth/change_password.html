{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block page_title %}Change Password{% endblock %}
{% block content %}
<div class="page-header"><div><h1>Change Password</h1><div class="breadcrumb">Update your account password</div></div></div>
<div class="card" style="max-width:480px;">
  <form method="POST">
    <div class="form-grid" style="grid-template-columns:1fr;">
      <div class="form-group"><label>Current Password</label><input name="old_password" type="password" required placeholder="Enter current password"/></div>
      <div class="form-group"><label>New Password</label><input name="new_password" type="password" required placeholder="Min 6 characters"/></div>
      <div class="form-group"><label>Confirm New Password</label><input name="confirm_password" type="password" required placeholder="Re-enter new password"/></div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Update Password</button>
      <a href="{{ url_for('home') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
