{% extends "base.html" %}
{% block title %}Edit Book{% endblock %}{% block page_title %}Edit Book{% endblock %}
{% block content %}
<div class="page-header"><div><h1>Edit Book</h1><div class="breadcrumb"><a href="{{ url_for('library') }}">Library</a> / Edit</div></div></div>
<div class="card" style="max-width:860px;"><form method="POST"><div class="form-grid">
<div class="form-group"><label>ISBN</label><input name="isbn" value="{{ book.get('isbn','') }}"/></div>
<div class="form-group"><label>Title</label><input name="title" value="{{ book.title }}" required/></div>
<div class="form-group"><label>Author</label><input name="author" value="{{ book.get('author','') }}" required/></div>
<div class="form-group"><label>Publisher</label><input name="publisher" value="{{ book.get('publisher','') }}"/></div>
<div class="form-group"><label>Category</label><select name="category">{% for cat in ['Computer Science','Mathematics','Physics','Chemistry','Biology','Literature','History','Management','Engineering','Yoga & Spirituality','Reference','Other'] %}<option {% if book.get('category')==cat %}selected{% endif %}>{{ cat }}</option>{% endfor %}</select></div>
<div class="form-group"><label>Edition</label><input name="edition" value="{{ book.get('edition','') }}"/></div>
<div class="form-group"><label>Year Published</label><input name="year_pub" type="number" value="{{ book.get('year_pub','') }}"/></div>
<div class="form-group"><label>Total Copies</label><input name="copies" type="number" min="1" value="{{ book.get('copies',1) }}"/></div>
<div class="form-group"><label>Available Copies</label><input name="available" type="number" min="0" value="{{ book.get('available',0) }}"/></div>
<div class="form-group"><label>Rack / Shelf No.</label><input name="rack_no" value="{{ book.get('rack_no','') }}"/></div>
</div>
<div class="form-actions"><button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Update</button><a href="{{ url_for('library') }}" class="btn btn-secondary">Cancel</a></div>
</form></div>{% endblock %}
