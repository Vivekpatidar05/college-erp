{% extends "base.html" %}
{% block title %}Add Timetable Slot{% endblock %}{% block page_title %}Add Timetable Slot{% endblock %}
{% block content %}
<div class="page-header"><div><h1>Add Timetable Slot</h1><div class="breadcrumb"><a href="{{ url_for('timetable') }}">Timetable</a> / Add</div></div></div>
<div class="card" style="max-width:780px;"><form method="POST"><div class="form-grid">
<div class="form-group"><label>Day *</label><select name="day" required>{% for d in days %}<option>{{ d }}</option>{% endfor %}</select></div>
<div class="form-group"><label>Time Start *</label><input name="time_start" type="time" required/></div>
<div class="form-group"><label>Time End *</label><input name="time_end" type="time" required/></div>
<div class="form-group"><label>Course *</label><select name="course" required><option value="">-- Select --</option>{% for c in courses %}<option>{{ c.name }}</option>{% endfor %}</select></div>
<div class="form-group"><label>Semester</label><select name="semester">{% for i in range(1,9) %}<option>Semester {{ i }}</option>{% endfor %}</select></div>
<div class="form-group"><label>Subject *</label><input name="subject" required placeholder="Subject name"/></div>
<div class="form-group"><label>Teacher</label><select name="teacher"><option value="">-- Select --</option>{% for t in teachers %}<option>{{ t.name }} ({{ t.get('subject','') }})</option>{% endfor %}</select></div>
<div class="form-group"><label>Room / Hall</label><input name="room" placeholder="Room 101, Lab 2…"/></div>
</div>
<div class="form-actions"><button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Add Slot</button><a href="{{ url_for('timetable') }}" class="btn btn-secondary">Cancel</a></div>
</form></div>{% endblock %}
