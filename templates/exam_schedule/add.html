{% extends "base.html" %}
{% block title %}Schedule Exam{% endblock %}{% block page_title %}Schedule Exam{% endblock %}
{% block content %}
<div class="page-header"><div><h1>Schedule Exam</h1><div class="breadcrumb"><a href="{{ url_for('exam_schedule') }}">Exams</a> / Add</div></div></div>
<div class="card" style="max-width:860px;"><form method="POST"><div class="form-grid">
<div class="form-group"><label>Subject *</label><input name="subject" required placeholder="Subject name"/></div>
<div class="form-group"><label>Course *</label><select name="course" required><option value="">-- Select --</option>{% for c in courses %}<option>{{ c.name }}</option>{% endfor %}</select></div>
<div class="form-group"><label>Semester</label><select name="semester">{% for i in range(1,9) %}<option>Semester {{ i }}</option>{% endfor %}</select></div>
<div class="form-group"><label>Exam Type</label><select name="exam_type"><option>Mid-Term</option><option>End-Term</option><option>Practical</option><option>Internal</option><option>Supplementary</option></select></div>
<div class="form-group"><label>Exam Date *</label><input name="exam_date" type="date" required/></div>
<div class="form-group"><label>Time Start</label><input name="time_start" type="time"/></div>
<div class="form-group"><label>Time End</label><input name="time_end" type="time"/></div>
<div class="form-group"><label>Room / Hall</label><input name="room" placeholder="Exam Hall 1…"/></div>
<div class="form-group"><label>Max Marks</label><input name="max_marks" type="number" value="100"/></div>
<div class="form-group full"><label>Notes</label><textarea name="notes" placeholder="Special instructions…"></textarea></div>
</div>
<div class="form-actions"><button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Schedule</button><a href="{{ url_for('exam_schedule') }}" class="btn btn-secondary">Cancel</a></div>
</form></div>{% endblock %}
