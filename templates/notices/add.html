{% extends "base.html" %}
{% block title %}Post Notice{% endblock %}{% block page_title %}Post Notice{% endblock %}
{% block content %}
<div class="page-header"><div><h1>Post Notice</h1><div class="breadcrumb"><a href="{{ url_for('notices') }}">Notices</a> / Add</div></div></div>
<div class="card" style="max-width:780px;"><form method="POST"><div class="form-grid">
<div class="form-group full"><label>Title *</label><input name="title" required placeholder="Clear, concise notice title"/></div>
<div class="form-group"><label>Category</label><select name="category"><option>General</option><option>Academic</option><option>Exam</option><option>Event</option><option>Holiday</option><option>Fee</option><option>Admission</option><option>Urgent</option></select></div>
<div class="form-group"><label>Priority</label><select name="priority"><option>Low</option><option>Medium</option><option>High</option></select></div>
<div class="form-group"><label>Target Audience</label><select name="target"><option>All</option><option>Students</option><option>Teachers</option><option>Admin</option></select></div>
<div class="form-group"><label>Posted By</label><input name="author" value="Admin" placeholder="Author name"/></div>
<div class="form-group full"><label>Content *</label><textarea name="content" required style="min-height:140px;" placeholder="Full notice content…"></textarea></div>
</div>
<div class="form-actions"><button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Post Notice</button><a href="{{ url_for('notices') }}" class="btn btn-secondary">Cancel</a></div>
</form></div>{% endblock %}
