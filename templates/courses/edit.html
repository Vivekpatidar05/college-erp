{% extends "base.html" %}
{% block title %}Edit Course{% endblock %}
{% block page_title %}Edit Course{% endblock %}

{% block content %}
<div class="page-header">
  <div><h1>Edit Course</h1><div class="breadcrumb"><a href="{{ url_for('courses') }}" style="color:var(--primary)">Courses</a> / Edit</div></div>
</div>
<div class="card" style="max-width:800px;">
  <form method="POST">
    <div class="form-grid">
      <div class="form-group"><label>Course Code</label><input name="code" value="{{ course.code }}" required/></div>
      <div class="form-group"><label>Course Name</label><input name="name" value="{{ course.name }}" required/></div>
      <div class="form-group"><label>Department</label><input name="dept" value="{{ course.get('dept','') }}"/></div>
      <div class="form-group"><label>Duration</label><input name="duration" value="{{ course.get('duration','') }}"/></div>
      <div class="form-group"><label>Total Seats</label><input name="seats" type="number" value="{{ course.get('seats','') }}"/></div>
      <div class="form-group"><label>Annual Fees (₹)</label><input name="fees" type="number" value="{{ course.get('fees','') }}"/></div>
      <div class="form-group full-width"><label>Description</label><textarea name="desc">{{ course.get('desc','') }}</textarea></div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Update Course</button>
      <a href="{{ url_for('courses') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
