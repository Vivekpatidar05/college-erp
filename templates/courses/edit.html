{% extends "base.html" %}
{% block title %}Edit Course{% endblock %}{% block page_title %}Edit Course{% endblock %}
{% block content %}
<div class="page-header"><div><h1>Edit Course</h1><div class="breadcrumb"><a href="{{ url_for('courses') }}">Courses</a> / Edit</div></div></div>
<div class="card" style="max-width:860px;"><form method="POST"><div class="form-grid">
<div class="form-group"><label>Course Code</label><input name="code" value="{{ course.code }}" required/></div>
<div class="form-group"><label>Course Name</label><input name="name" value="{{ course.name }}" required/></div>
<div class="form-group"><label>Level</label><select name="level">{% for l in ['UG','PG','PhD','Diploma','Certificate'] %}<option {% if course.get('level')==l %}selected{% endif %}>{{ l }}</option>{% endfor %}</select></div>
<div class="form-group"><label>Department</label><input name="dept" value="{{ course.get('dept','') }}"/></div>
<div class="form-group"><label>Duration</label><input name="duration" value="{{ course.get('duration','') }}"/></div>
<div class="form-group"><label>Total Semesters</label><input name="semesters" type="number" value="{{ course.get('semesters','') }}"/></div>
<div class="form-group"><label>Seats</label><input name="seats" type="number" value="{{ course.get('seats','') }}"/></div>
<div class="form-group"><label>Annual Fees (₹)</label><input name="fees" type="number" value="{{ course.get('fees','') }}"/></div>
<div class="form-group full"><label>Description</label><textarea name="desc">{{ course.get('desc','') }}</textarea></div>
</div>
<div class="form-actions"><button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Update</button><a href="{{ url_for('courses') }}" class="btn btn-secondary">Cancel</a></div>
</form></div>{% endblock %}
