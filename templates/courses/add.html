{% extends "base.html" %}
{% block title %}Add Course{% endblock %}{% block page_title %}Add Course{% endblock %}
{% block content %}
<div class="page-header"><div><h1>Add Course</h1><div class="breadcrumb"><a href="{{ url_for('courses') }}">Courses</a> / Add</div></div></div>
<div class="card" style="max-width:860px;"><form method="POST"><div class="form-grid">
<div class="form-group"><label>Course Code *</label><input name="code" required placeholder="MCA, BCA…"/></div>
<div class="form-group"><label>Course Name *</label><input name="name" required/></div>
<div class="form-group"><label>Level</label><select name="level"><option>UG</option><option>PG</option><option>PhD</option><option>Diploma</option><option>Certificate</option></select></div>
<div class="form-group"><label>Department</label><input name="dept" placeholder="Computer Science…"/></div>
<div class="form-group"><label>Duration</label><input name="duration" placeholder="2 Years, 3 Years…"/></div>
<div class="form-group"><label>Total Semesters</label><input name="semesters" type="number" min="1" max="12"/></div>
<div class="form-group"><label>Total Seats</label><input name="seats" type="number" min="1"/></div>
<div class="form-group"><label>Annual Fees (₹)</label><input name="fees" type="number"/></div>
<div class="form-group full"><label>Description</label><textarea name="desc"></textarea></div>
</div>
<div class="form-actions"><button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Course</button><a href="{{ url_for('courses') }}" class="btn btn-secondary">Cancel</a></div>
</form></div>{% endblock %}
