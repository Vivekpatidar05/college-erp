{% extends "base.html" %}
{% block title %}Add Course{% endblock %}
{% block page_title %}Add Course{% endblock %}

{% block content %}
<div class="page-header">
  <div><h1>Add Course</h1><div class="breadcrumb"><a href="{{ url_for('courses') }}" style="color:var(--primary)">Courses</a> / Add</div></div>
</div>
<div class="card" style="max-width:800px;">
  <form method="POST">
    <div class="form-grid">
      <div class="form-group"><label>Course Code *</label><input name="code" required placeholder="e.g. MCA, BCA, BTECH"/></div>
      <div class="form-group"><label>Course Name *</label><input name="name" required placeholder="Full course name"/></div>
      <div class="form-group"><label>Department</label><input name="dept" placeholder="e.g. Computer Science"/></div>
      <div class="form-group"><label>Duration</label><input name="duration" placeholder="e.g. 2 Years, 3 Years"/></div>
      <div class="form-group"><label>Total Seats</label><input name="seats" type="number" min="1" placeholder="Number of seats"/></div>
      <div class="form-group"><label>Annual Fees (₹)</label><input name="fees" type="number" placeholder="Fee amount"/></div>
      <div class="form-group full-width"><label>Description</label><textarea name="desc" placeholder="Brief description of the course…"></textarea></div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Course</button>
      <a href="{{ url_for('courses') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
