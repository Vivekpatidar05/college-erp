{% extends "base.html" %}
{% block title %}Add User{% endblock %}
{% block page_title %}Add User{% endblock %}

{% block content %}
<div class="page-header">
  <div><h1>Add User</h1><div class="breadcrumb"><a href="{{ url_for('admin_users') }}" style="color:var(--primary)">Users</a> / Add New</div></div>
</div>

<div class="card" style="max-width:760px;">
  <form method="POST">
    <!-- Role selector cards -->
    <div style="margin-bottom:24px;">
      <label style="font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.6px;display:block;margin-bottom:12px;">Select Role</label>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;" id="role-cards">
        <label class="role-select-card" for="r-admin">
          <input type="radio" name="role" id="r-admin" value="admin" style="display:none;" onchange="onRoleChange('admin')"/>
          <div class="rsc-icon" style="background:rgba(108,99,255,0.15);color:#a08fff;"><i class="fas fa-user-shield"></i></div>
          <div class="rsc-title">Admin</div>
          <div class="rsc-sub">Full system access</div>
        </label>
        <label class="role-select-card" for="r-teacher">
          <input type="radio" name="role" id="r-teacher" value="teacher" style="display:none;" onchange="onRoleChange('teacher')"/>
          <div class="rsc-icon" style="background:rgba(0,212,180,0.12);color:#00d4b4;"><i class="fas fa-chalkboard-teacher"></i></div>
          <div class="rsc-title">Teacher</div>
          <div class="rsc-sub">Mark subject attendance</div>
        </label>
        <label class="role-select-card" for="r-student">
          <input type="radio" name="role" id="r-student" value="student" style="display:none;" onchange="onRoleChange('student')"/>
          <div class="rsc-icon" style="background:rgba(245,166,35,0.12);color:#f5a623;"><i class="fas fa-user-graduate"></i></div>
          <div class="rsc-title">Student</div>
          <div class="rsc-sub">View own records</div>
        </label>
      </div>
    </div>

    <div class="form-grid">
      <div class="form-group"><label>Username *</label><input name="username" required placeholder="Unique login name"/></div>
      <div class="form-group"><label>Password *</label><input name="password" type="password" required placeholder="Set a secure password"/></div>
      <div class="form-group"><label>Display Name</label><input name="name" placeholder="Auto-filled from linked record"/></div>

      <!-- Teacher link (shown when teacher selected) -->
      <div class="form-group" id="teacher-link" style="display:none;">
        <label>Link to Teacher Record *</label>
        <select name="linked_id">
          <option value="">-- Select Teacher --</option>
          {% for t in teachers %}
          <option value="{{ t._id }}">{{ t.name }} ({{ t.emp_id }}) — {{ t.get('subject','') }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Student link (shown when student selected) -->
      <div class="form-group" id="student-link" style="display:none;">
        <label>Link to Student Record *</label>
        <select name="linked_id">
          <option value="">-- Select Student --</option>
          {% for s in students %}
          <option value="{{ s._id }}">{{ s.name }} ({{ s.roll_no }})</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary"><i class="fas fa-user-plus"></i> Create User</button>
      <a href="{{ url_for('admin_users') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>

<style>
.role-select-card {
  display:flex;flex-direction:column;align-items:center;gap:8px;
  padding:18px 12px;border:2px solid var(--border);border-radius:12px;
  cursor:pointer;transition:all 0.2s;text-align:center;
}
.role-select-card:hover { border-color:var(--primary);background:rgba(108,99,255,0.05); }
.role-select-card.selected { border-color:var(--primary);background:rgba(108,99,255,0.1); }
.rsc-icon { width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px; }
.rsc-title { font-weight:600;font-size:14px; }
.rsc-sub   { font-size:11px;color:var(--text-muted); }
</style>
<script>
function onRoleChange(role) {
  document.querySelectorAll('.role-select-card').forEach(c => c.classList.remove('selected'));
  document.querySelector(`[for="r-${role}"]`).classList.add('selected');
  document.getElementById('teacher-link').style.display = role === 'teacher' ? '' : 'none';
  document.getElementById('student-link').style.display = role === 'student' ? '' : 'none';
}
</script>
{% endblock %}
