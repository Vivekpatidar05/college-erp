{% extends "base.html" %}
{% block title %}Edit Fee{% endblock %}{% block page_title %}Edit Fee Record{% endblock %}
{% block content %}
<div class="page-header"><div><h1>Edit Fee Record</h1><div class="breadcrumb"><a href="{{ url_for('fees') }}">Fees</a> / Edit</div></div></div>
<div class="card" style="max-width:900px;"><form method="POST"><div class="form-grid">
<div class="form-group"><label>Roll Number</label><input name="roll_no" value="{{ fee.roll_no }}" required/></div>
<div class="form-group"><label>Student Name</label><input name="student_name" value="{{ fee.student_name }}"/></div>
<div class="form-group"><label>Course</label><input name="course" value="{{ fee.get('course','') }}"/></div>
<div class="form-group"><label>Fee Type</label><select name="fee_type">{% for ft in ['Tuition Fee','Exam Fee','Library Fee','Lab Fee','Hostel Fee','Transport Fee','Other'] %}<option {% if fee.get('fee_type')==ft %}selected{% endif %}>{{ ft }}</option>{% endfor %}</select></div>
<div class="form-group"><label>Amount (₹)</label><input name="amount" type="number" value="{{ fee.get('amount','') }}"/></div>
<div class="form-group"><label>Due Date</label><input name="due_date" type="date" value="{{ fee.get('due_date','') }}"/></div>
<div class="form-group"><label>Paid Date</label><input name="paid_date" type="date" value="{{ fee.get('paid_date','') }}"/></div>
<div class="form-group"><label>Status</label><select name="status">{% for st in ['Pending','Paid','Overdue'] %}<option {% if fee.get('status')==st %}selected{% endif %}>{{ st }}</option>{% endfor %}</select></div>
<div class="form-group"><label>Transaction ID</label><input name="transaction_id" value="{{ fee.get('transaction_id','') }}"/></div>
<div class="form-group full"><label>Remarks</label><textarea name="remarks">{{ fee.get('remarks','') }}</textarea></div>
</div>
<div class="form-actions"><button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Update</button><a href="{{ url_for('fees') }}" class="btn btn-secondary">Cancel</a></div>
</form></div>{% endblock %}
