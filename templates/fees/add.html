{% extends "base.html" %}
{% block title %}Add Fee{% endblock %}{% block page_title %}Add Fee Record{% endblock %}
{% block content %}
<div class="page-header"><div><h1>Add Fee Record</h1><div class="breadcrumb"><a href="{{ url_for('fees') }}">Fees</a> / Add</div></div></div>
<div class="card" style="max-width:900px;"><form method="POST"><div class="form-grid">
<div class="form-group"><label>Roll Number *</label><input name="roll_no" class="roll-lookup" required placeholder="Auto-fills name"/></div>
<div class="form-group"><label>Student Name</label><input name="student_name" class="s-name" placeholder="Auto-filled"/></div>
<div class="form-group"><label>Course</label><input name="course" class="s-course" placeholder="Auto-filled"/></div>
<div class="form-group"><label>Fee Type</label><select name="fee_type"><option>Tuition Fee</option><option>Exam Fee</option><option>Library Fee</option><option>Lab Fee</option><option>Hostel Fee</option><option>Transport Fee</option><option>Other</option></select></div>
<div class="form-group"><label>Amount (₹) *</label><input name="amount" type="number" min="0" required/></div>
<div class="form-group"><label>Due Date</label><input name="due_date" type="date"/></div>
<div class="form-group"><label>Paid Date</label><input name="paid_date" type="date"/></div>
<div class="form-group"><label>Status</label><select name="status"><option>Pending</option><option>Paid</option><option>Overdue</option></select></div>
<div class="form-group"><label>Transaction ID</label><input name="transaction_id" placeholder="UPI/Bank ref no."/></div>
<div class="form-group full"><label>Remarks</label><textarea name="remarks"></textarea></div>
</div>
<div class="form-actions"><button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Record</button><a href="{{ url_for('fees') }}" class="btn btn-secondary">Cancel</a></div>
</form></div>{% endblock %}
