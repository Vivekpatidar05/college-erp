{% extends "base.html" %}
{% block title %}Edit Hostel Record{% endblock %}{% block page_title %}Edit Hostel Record{% endblock %}
{% block content %}
<div class="page-header"><div><h1>Edit Hostel Record</h1><div class="breadcrumb"><a href="{{ url_for('hostel') }}">Hostel</a> / Edit</div></div></div>
<div class="card" style="max-width:860px;"><form method="POST"><div class="form-grid">
<div class="form-group"><label>Roll Number</label><input name="roll_no" value="{{ record.roll_no }}" required/></div>
<div class="form-group"><label>Student Name</label><input name="student_name" value="{{ record.student_name }}"/></div>
<div class="form-group"><label>Hostel Name</label><input name="hostel_name" value="{{ record.get('hostel_name','') }}"/></div>
<div class="form-group"><label>Room Number</label><input name="room_no" value="{{ record.get('room_no','') }}"/></div>
<div class="form-group"><label>Room Type</label><select name="room_type">{% for rt in ['Single','Double','Triple','Dormitory'] %}<option {% if record.get('room_type')==rt %}selected{% endif %}>{{ rt }}</option>{% endfor %}</select></div>
<div class="form-group"><label>Joining Date</label><input name="joining_date" type="date" value="{{ record.get('joining_date','') }}"/></div>
<div class="form-group"><label>Fee per Month (₹)</label><input name="fees_per_month" type="number" value="{{ record.get('fees_per_month','') }}"/></div>
<div class="form-group"><label>Status</label><select name="status">{% for st in ['Active','Vacated'] %}<option {% if record.get('status')==st %}selected{% endif %}>{{ st }}</option>{% endfor %}</select></div>
<div class="form-group full"><label>Remarks</label><textarea name="remarks">{{ record.get('remarks','') }}</textarea></div>
</div>
<div class="form-actions"><button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Update</button><a href="{{ url_for('hostel') }}" class="btn btn-secondary">Cancel</a></div>
</form></div>{% endblock %}
