{% extends "base.html" %}
{% block title %}Edit Teacher{% endblock %}
{% block page_title %}Edit Teacher{% endblock %}

{% block content %}
<div class="page-header">
  <div><h1>Edit Teacher</h1><div class="breadcrumb"><a href="{{ url_for('teachers') }}" style="color:var(--primary)">Teachers</a> / Edit</div></div>
</div>
<div class="card" style="max-width:900px;">
  <form method="POST">
    <div class="form-grid">
      <div class="form-group"><label>Employee ID</label><input name="emp_id" value="{{ teacher.emp_id }}" required/></div>
      <div class="form-group"><label>Full Name</label><input name="name" value="{{ teacher.name }}" required/></div>
      <div class="form-group"><label>Email</label><input name="email" type="email" value="{{ teacher.get('email','') }}"/></div>
      <div class="form-group"><label>Phone</label><input name="phone" value="{{ teacher.get('phone','') }}"/></div>
      <div class="form-group"><label>Subject</label><input name="subject" value="{{ teacher.get('subject','') }}"/></div>
      <div class="form-group"><label>Department</label>
        <select name="department">
          {% for d in ['Computer Science','Mathematics','Physics','Chemistry','English','Management','Other'] %}
          <option {% if teacher.get('department')==d %}selected{% endif %}>{{ d }}</option>
          {% endfor %}
        </select></div>
      <div class="form-group"><label>Qualification</label><input name="qualification" value="{{ teacher.get('qualification','') }}"/></div>
      <div class="form-group"><label>Experience (years)</label><input name="experience" type="number" value="{{ teacher.get('experience','') }}"/></div>
      <div class="form-group"><label>Salary (₹)</label><input name="salary" type="number" value="{{ teacher.get('salary','') }}"/></div>
      <div class="form-group"><label>Joining Date</label><input name="joining_date" type="date" value="{{ teacher.get('joining_date','') }}"/></div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Update Teacher</button>
      <a href="{{ url_for('teachers') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
