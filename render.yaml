services:
  - type: web
    name: dsvv-erp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --log-level info
    envVars:
      - key: MONGO_URI
        sync: false          # Set this manually in Render dashboard
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
      - key: DB_NAME
        value: dsvv_erp
      - key: PYTHON_VERSION
        value: 3.11.9
    healthCheckPath: /login
    autoDeploy: true
